version: "3.9"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      GENERIC_TIMEZONE: UTC
      TZ: UTC
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
  short-video-maker:
    image: gyoridavid/short-video-maker:latest-tiny
    container_name: short-video-maker
    ports:
      - "3123:3123"
    environment:
      LOG_LEVEL: "debug"
      PEXELS_API_KEY: VsX1OIrcrboQaInRFNQpmxKLAlDWdNyXeS1S7LBrgwSAJ69sOFvjHw2I
    restart: unless-stopped
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
volumes:
  n8n_data:
  ollama:

